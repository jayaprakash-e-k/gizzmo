<!DOCTYPE html>

        background-color: #ffffff;

        padding: 2rem;
      }

        background: #f4f4f4;

  <body>
    <div class="container">
      <h1>GIZZMO 2k24</h1>
      <br />

      <p>&emsp;Your OTP for password reset is:</p>

      <br />

      <p>Thank you.</p>
    </div>
  </body>
</html>
