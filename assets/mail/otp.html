<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIZZMO 2k24 - Password Reset OTP</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 2rem;
      }
      .container {
        background-color: #ffffff;
        width: 90%;
        padding: 2rem;
      }
      .container .header {
        background-color: #252525;
      }

      .container .header img {
        width: 100%;
        height: auto;
        object-fit: cover;
      }
      .otp {
        background: #f4f4f4;
        padding: 1rem;
        font-size: 2rem;
        text-align: center;
      }
      .container .footer {
        background-color: #252525;
        padding: 1rem 2rem;
        color: #fff;
        text-align: center;
      }

      .container .footer p {
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .container .footer .social-links {
        display: flex;
        justify-content: center;
        text-align: center;
        gap: 10px;
      }

      .container .footer .social-links a {
        font-size: 1.5rem;
        color: var(--clr);
        transition: color 0.3s;
      }

      .container .footer .social-links a img {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="{{gizzmo_logo}}" alt="Gizzmo Logo" />
      </div>
      <br />
      <p>Dear {{name}},</p>
      <p>&emsp;Your OTP for verifing your Email ID is:</p>
      <br />
      <h2 class="otp">{{otp}}</h2>
      <br />
      <p>Use this OTP to confirm your Email ID.</p>
      <p>Thank you.</p>
      <div class="footer">
        <p>© 2024 Gizzmo. All rights reserved.</p>
        <div class="social-links">
          <a
            href="https://www.facebook.com/profile.php?id=61551881603513"
            target="_blank"
            style="--clr: #316ff6"
          >
          <img src="https://img.icons8.com/color/48/000000/facebook-new.png"/>
          </a>
          <a
            href="https://www.instagram.com/cse_esec"
            target="_blank"
            style="--clr: #d62976"
          >
            <img src="https://img.icons8.com/color/48/000000/instagram-new.png"/>
          </a>
          <a
            href="https://www.linkedin.com/company/esecindia"
            target="_blank"
            style="--clr: #0077b5"
          >
          <img src="https://img.icons8.com/color/48/000000/linkedin.png"/>
          </a>
          <a
            href="https://youtube.com/@esecindia/"
            target="_blank"
            style="--clr: #cd201f"
          >
          <img src="https://img.icons8.com/color/48/000000/youtube-play.png"/>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
